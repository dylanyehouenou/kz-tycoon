services:
  - type: web
    name: kz-tycoon
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE
        value: database/kz_tycoon.db
      - key: FLASK_DEBUG
        value: "0"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
